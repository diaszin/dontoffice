<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.name }} — dontoffice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #222;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 48px;
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }

        .page-url {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            overflow: hidden;
        }

        .page-url .domain {
            color: #989;
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .page-url .separator {
            color: #ccc;
        }

        .page-url .slug {
            color: #444;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Buttons ── */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download,
        .btn-upload {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            color: #444;
            font-size: 13px;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-download:hover {
            border-color: #989;
            color: #989;
        }

        .btn-upload:hover {
            border-color: #989;
            color: #989;
        }

        .btn-upload.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .btn-download svg,
        .btn-upload svg {
            flex-shrink: 0;
        }

        /* ── File info bar ── */
        .file-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 20px;
            background: #fafafa;
            border-bottom: 1px solid #efefef;
            font-size: 12px;
            color: #aaa;
            flex-shrink: 0;
        }

        .file-bar .filename {
            color: #989;
            font-weight: bold;
        }

        /* ── Viewer ── */
        .viewer-wrap {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* line numbers */
        .line-numbers {
            padding: 16px 0;
            background: #fafafa;
            border-right: 1px solid #efefef;
            text-align: right;
            user-select: none;
            overflow: hidden;
            flex-shrink: 0;
            min-width: 52px;
        }

        .line-numbers span {
            display: block;
            padding: 0 12px 0 8px;
            line-height: 1.6em;
            font-size: 13px;
            color: #ccc;
        }

        /* content */
        .viewer {
            flex: 1;
            padding: 16px 20px;
            overflow: auto;
            font-size: 13px;
            line-height: 1.6em;
            white-space: pre;
            color: #333;
            background: #fff;
            outline: none;
        }

        /* binary file fallback */
        .binary-notice {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #bbb;
            font-size: 14px;
        }

        .binary-notice svg {
            opacity: 0.25;
        }

        .binary-notice p {
            font-style: italic;
            color: #aaa;
        }

        .image-preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #bbb;
            font-size: 14px;
            width: 100%;
            height: 100%;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #fafafa;
        }

        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #989;
        }
    </style>
</head>

<body>

    <header>
        <div class="page-url">
            <span class="domain">dontoffice /</span>
            <span class="separator">/</span>
            <span class="slug">{{ page.name }}</span>
        </div>

        <div class="header-actions">
            <input type="file" id="fileInput" style="display:none">
            <button class="btn-upload" id="btnUpload">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 17 12 12 17 17" />
                    <line x1="12" y1="12" x2="12" y2="24" />
                </svg>
                Trocar arquivo
            </button>

            <a class="btn-download" id="btnDownload" href="/download/{{ page.filename }}" download>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Baixar arquivo
            </a>
        </div>
    </header>

    <div class="file-bar">
        <span class="filename">{{ page.filename }}</span>
    </div>

    <div class="viewer-wrap">
        {% if page.content is not none %}
        <div class="line-numbers" id="lineNumbers"></div>
        <div class="viewer" id="viewer" tabindex="0">{{ page.content }}</div>
        {% elif page.extension == "png" %}
        <div class="image-preview">
            <img src="/download/{{ page.filename }}" alt="{{ page.filename }}" width="auto" height="auto">
            <a class="btn-download" href="/download/{{ page.filename }}" download>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Baixar arquivo
        </a>
        </div>
        {% else %}
        <div class="binary-notice">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
            </svg>
            <p>Este arquivo não pode ser visualizado como texto.</p>
            <a class="btn-download" href="/download/{{ page.filename }}" download>
                Baixar arquivo
            </a>
        </div>
        {% endif %}
    </div>

    <script>
        const PAGE_NAME = '{{ page.name }}';

        /* ── Line numbers ── */
        function buildLineNumbers() {
            const viewer = document.getElementById('viewer');
            const lineNumbers = document.getElementById('lineNumbers');
            if (!viewer || !lineNumbers) return;

            const lines = viewer.textContent.split('\n');
            const count = lines[lines.length - 1] === '' ? lines.length - 1 : lines.length;
            let html = '';
            for (let i = 1; i <= count; i++) html += `<span>${i}</span>`;
            lineNumbers.innerHTML = html;

            viewer.addEventListener('scroll', () => {
                lineNumbers.scrollTop = viewer.scrollTop;
            });
        }
        buildLineNumbers();

        /* ── Update (trocar arquivo) ── */
        const fileInput  = document.getElementById('fileInput');
        const btnUpload  = document.getElementById('btnUpload');
        const btnDownload = document.getElementById('btnDownload');

        btnUpload.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            btnUpload.classList.add('loading');
            btnUpload.textContent = 'Enviando…';

            const form = new FormData();
            form.append('file', file);

            try {
                const res  = await fetch(`/update/${PAGE_NAME}`, { method: 'POST', body: form });
                const data = await res.json();

                if (!res.ok) { alert(data.error); return; }

                /* atualiza filename bar */
                document.querySelector('.file-bar .filename').textContent = data.filename;

                /* atualiza link de download */
                btnDownload.href = `/download/${data.filename}`;
                btnDownload.download = data.filename;

                /* atualiza área de visualização */
                const wrap = document.querySelector('.viewer-wrap');
                if (data.content !== null) {
                    wrap.innerHTML = `<div class="line-numbers" id="lineNumbers"></div>
                                      <div class="viewer" id="viewer" tabindex="0"></div>`;
                    document.getElementById('viewer').textContent = data.content;
                    buildLineNumbers();
                } else if (data.extension === 'png') {
                    wrap.innerHTML = `<div class="image-preview">
                        <img src="/download/${data.filename}" alt="${data.filename}" style="max-width:100%;max-height:100%">
                    </div>`;
                } else {
                    wrap.innerHTML = `<div class="binary-notice">
                        <p>Este arquivo não pode ser visualizado como texto.</p>
                    </div>`;
                }
            } catch (e) {
                alert('Erro ao enviar o arquivo.');
            } finally {
                btnUpload.classList.remove('loading');
                btnUpload.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 17 12 12 17 17"/><line x1="12" y1="12" x2="12" y2="24"/></svg> Trocar arquivo`;
                fileInput.value = '';
            }
        });
    </script>

</body>

</html>
