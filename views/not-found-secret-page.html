<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página não encontrada - Don't Office">
    <link rel="stylesheet" href="/static/style.css">
    <title>Página não encontrada · Don't Office</title>
    <style>
        #not-found-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }

        #not-found-code {
            font-size: 5rem;
            font-weight: 700;
            color: #989;
            line-height: 1;
            margin: 0;
        }

        #not-found-title {
            font-size: 1.1rem;
            color: #555;
            margin: 0 0 16px 0;
        }

        #not-found-message {
            font-size: 0.95rem;
            color: #aaa;
            margin: 0 0 24px 0;
        }

        #not-found-message code {
            color: #989;
            font-weight: 600;
        }

        #not-found-link {
            color: #989;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        #not-found-link:hover {
            border-color: #989;
        }
    </style>
</head>

<body>
    <div id="not-found-container">
        <p id="not-found-code">404</p>
        <h1 id="not-found-title">Página não encontrada</h1>
        <p id="not-found-message">
            A página <code>/{{ secret_page_name }}</code> não existe ou ainda não foi criada.
        </p>
        <a id="not-found-link" href="/">← Voltar para o início</a>
    </div>
</body>

</html>
