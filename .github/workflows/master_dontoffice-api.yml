name: Build and deploy Python app to Azure Web App - dontoffice-api

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install dependencies
        working-directory: ./api
        run: |
          poetry install --only main --no-interaction
      
      - name: Install Export Plugin
        working-directory: ./api
        run: |
            poetry self add poetry-plugin-export

      - name: Export requirements.txt
        working-directory: ./api
        run: |
          poetry export --format=requirements.txt --output=requirements.txt --without-hashes

      # Opcional
      - name: Run tests
        working-directory: ./api
        run: |
          poetry run pytest || true

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !.venv/
            !.git/
            !.github/
            !__pycache__/
            !tests/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: dontoffice-api
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_972F24F84DE64AA9BB10FE1B94C52B7E }}