name: Build and deploy Python app to Azure Web App - dontoffice-api

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry self add poetry-plugin-export

      - name: Install dependencies
        working-directory: ./api
        run: |
          poetry install --only main --no-interaction

      - name: Export requirements.txt
        working-directory: ./api
        run: |
          poetry export \
            --format=requirements.txt \
            --output=requirements.txt \
            --without-hashes

      - name: Run tests
        working-directory: ./api
        run: |
          poetry run pytest || true

      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp -R api/. deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: dontoffice-api
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_972F24F84DE64AA9BB10FE1B94C52B7E }}